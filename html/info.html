<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="/index.css">
        <title>Punto Giro</title>
    </head>
    <body>
        <header class="PuntoGiro-Navbar">
            <nav>
                <a href=""><img src="/icons/logo-giro.svg" alt=""></a>
                <a href=""><img src="/icons/iso.svg" alt=""></a>
            </nav>
        </header>
        <main class="PuntoGiro-Main">
            <div class="PuntoGiro-Info">
                <input type="text" placeholder="buscar">
                <div class="photo-grid-info">
                    <figure class="openModalBtn" id="openChequea">
                        <img src="/img/aceitegiro.png" alt="Image 1">
                        <figcaption>Aceite Vegetales Usados</figcaption>
                    </figure>
                    <figure class="openModalBtn" id="openChequea">
                        <img src="/img/aceitegiro.png" alt="Image 1">
                        <figcaption>Aceite Vegetales Usados</figcaption>
                    </figure>
                    <figure class="openModalBtn" id="openChequea">
                        <img src="/img/aceitegiro.png" alt="Image 1">
                        <figcaption>Aceite Vegetales Usados</figcaption>
                    </figure>
                    <figure class="openModalBtn" id="openChequea">
                        <img src="/img/aceitegiro.png" alt="Image 1">
                        <figcaption>Aceite Vegetales Usados</figcaption>
                    </figure>
                </div>
            </div>
            <div class="modal-background">
                <img src="https://live.staticflickr.com/65535/52783579196_dd16702cfb_b.jpg" alt="" style="border-radius: 10px; margin: 0 auto; max-height: 75vh; max-width: 90vw;">
                <span class="close cerrar-btn" style="height: 5vh; width: 25vw; display: flex; align-items: center; justify-content: center; margin-block: 15px;"><img src="/close.svg" alt="Close"></span>
                <script>
                    const openModalBtn = document.querySelector('.openModalBtn');
                    const modal = document.querySelector('.modal-background');
                    const closeModalBtn = document.querySelector('.close');
                  
                    function openModal() {
                      modal.style.display = 'flex';
                    }
                  
                    function closeModal() {
                      modal.style.display = 'none';
                    }
                  
                    openModalBtn.addEventListener('click', openModal);
                    closeModalBtn.addEventListener('click', closeModal);
                </script>
            </div>
        </main>
        <footer class="PuntoGiro-Footer">
            <a href="https://www.instagram.com/"><img src="/icons/instagram.svg" alt="Instagram"></a>
            <a href="https://www.youtube.com/"><img src="/icons/facebook.svg" alt="YouTube"></a>
            <a href="https://www.facebook.com/"><img src="/icons/youtube.svg" alt="Facebook"></a>
            <a href="https://www.google.com/"><img src="/icons/email.svg" alt="Google"></a>
        </footer>

        <script src="/index.js"></script>
    </body>
</html>
